name: AniMenyu
options:
  bundleIdPrefix: com.lodev09
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
targets:
  AniMenyu:
    type: application
    platform: macOS
    sources:
      - AniMenyu
    info:
      path: AniMenyu/Info.plist
      properties:
        CFBundleName: AniMenyu
        CFBundleDisplayName: AniMenyu
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSUIElement: true
        LSApplicationCategoryType: public.app-category.entertainment
        CFBundleURLTypes:
          - CFBundleURLName: com.lodev09.animenyu
            CFBundleURLSchemes:
              - animenyu
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lodev09.animenyu
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_VERSION: "5.9"
