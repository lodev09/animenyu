name: AniMenyu
options:
  bundleIdPrefix: com.lodev09
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
targets:
  AniMenyu:
    type: application
    platform: macOS
    sources:
      - AniMenyu
    info:
      path: AniMenyu/Info.plist
      properties:
        CFBundleName: AniMenyu
        CFBundleDisplayName: AniMenyu
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSUIElement: true
        LSApplicationCategoryType: public.app-category.entertainment
        CFBundleURLTypes:
          - CFBundleURLName: com.lodev09.animenyu
            CFBundleURLSchemes:
              - animenyu
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lodev09.animenyu
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        # Set to sign dev builds with a stable identity (avoids repeated Keychain prompts):
        #   DEVELOPMENT_TEAM=<team-id> xcodegen generate
        DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_VERSION: "5.9"
